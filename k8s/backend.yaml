apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: quoridor-backend:v0.1.0
          imagePullPolicy: Never
          ports:
            - containerPort: 8764
          env:
            - name: AGENT_SERVICE_URL
              value: "http://agent-service:8090"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    app: backend
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - port: 8764
      targetPort: 8764
      protocol: TCP
