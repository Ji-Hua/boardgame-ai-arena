# CNN DQN training — 5000 episodes, episode-based curriculum schedule.
#
# Curriculum:
#   Phase 1 (ep   1-1000): random_legal only            — learn basic pawn movement
#   Phase 2 (ep 1001-2500): mixed (random_legal 70% / minimax_d1 30%)  — intro tactics
#   Phase 3 (ep 2501-4000): mixed (random_legal 40% / minimax_d1 40% / minimax_d2 20%)  — deeper tactics
#   Phase 4 (ep 4001-5000): minimax_d2                  — play only against depth-2 opponent
#
# All CNN / DDQN / reward parameters are identical to
# cnn_mixed_random80_minimaxd1_5k_001.yaml for easy apples-to-apples comparison.
#
# Run with:
#   PYTHONPATH=. PYTHONUNBUFFERED=1 uv run python -u scripts/train_dqn.py \
#     --config agent_system/training/configs/dqn/cnn_curriculum_random_to_minimax_5k_001.yaml \
#     2>&1 | tee agent_system/training/artifacts/dqn/cnn_curriculum_random_to_minimax_5k_001/train.log

# --- episode budget ---
episodes: 5000
max_steps_per_episode: 3000

# --- replay buffer ---
buffer_capacity: 100000
warmup_size: 5000
batch_size: 128

# --- optimizer ---
lr: 1.0e-4
gamma: 0.95
grad_clip_norm: 10.0

# --- exploration ---
epsilon_start: 1.0
epsilon_end: 0.05
epsilon_decay_steps: 200000

# --- target network ---
target_sync_interval: 200

# --- checkpointing ---
checkpoint_dir: agent_system/training/artifacts/dqn/cnn_curriculum_random_to_minimax_5k_001/checkpoints
checkpoint_interval: 500
agent_id: dqn_cnn_curriculum_random_to_minimax_5k_001

# --- episode-based curriculum schedule ---
# train_opponent and train_opponent_schedule are mutually exclusive.
# Each entry requires: from_episode, opponent.
# Optional: to_episode (omit for "until end of training").
# Episodes are 1-indexed. Ranges must not overlap.
train_opponent_schedule:
  - from_episode: 1
    to_episode: 1000
    opponent:
      type: random_legal

  - from_episode: 1001
    to_episode: 2500
    opponent:
      type: mixed
      opponents:
        - name: random_legal
          type: random_legal
          weight: 0.7
        - name: minimax_d1
          type: minimax
          depth: 1
          weight: 0.3

  - from_episode: 2501
    to_episode: 4000
    opponent:
      type: mixed
      opponents:
        - name: random_legal
          type: random_legal
          weight: 0.4
        - name: minimax_d1
          type: minimax
          depth: 1
          weight: 0.4
        - name: minimax_d2
          type: minimax
          depth: 2
          weight: 0.2

  - from_episode: 4001
    opponent:
      type: minimax
      depth: 2

# --- evaluation ---
# Evaluated against multiple opponents at each eval interval and at the end.
evaluation:
  interval: 500
  games_per_opponent: 200
  replay_sample_every: 100   # save full game replay at games 0, 100 per opponent per eval
  opponents:
    - name: pawn_random
      type: pawn_random
    - name: random_legal
      type: random_legal
    - name: minimax_d1
      type: minimax
      depth: 1
    - name: minimax_d2
      type: minimax
      depth: 2

# --- observation / model ---
obs_version: v1          # unused when model_arch=cnn
model_arch: cnn
cnn_channels: [32, 64, 64]
algorithm: double_dqn

# --- reward ---
reward_mode: distance_delta
distance_reward_weight: 0.04
distance_delta_clip: 1.0

# --- misc ---
seed: 42
log_interval: 100
device: auto
