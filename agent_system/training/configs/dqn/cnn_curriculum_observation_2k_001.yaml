# CNN DQN training — 2000-episode curriculum observation run.
#
# Purpose: Short run to validate the full training system end-to-end:
#   - YAML config loading
#   - Episode-based training curriculum
#   - Structured metrics artifacts
#   - Per-opponent evaluation with eval_results.jsonl
#   - Sampled offline evaluation replays for dashboard review
#
# Curriculum:
#   Phase 1 (ep    1-500):  random_legal 80% / minimax_d1 20%
#   Phase 2 (ep  501-1000): random_legal 40% / minimax_d1 60%
#   Phase 3 (ep 1001-1500): minimax_d1 only
#   Phase 4 (ep 1501-2000): minimax_d1 80% / minimax_d2 20%
#
# All CNN / DDQN / reward parameters are identical to
# cnn_curriculum_random_to_minimax_5k_001.yaml for apples-to-apples comparison.
#
# Run with:
#   PYTHONPATH=. PYTHONUNBUFFERED=1 uv run python -u scripts/train_dqn.py \
#     --config agent_system/training/configs/dqn/cnn_curriculum_observation_2k_001.yaml \
#     2>&1 | tee agent_system/training/artifacts/dqn/cnn_curriculum_observation_2k_001/train.log

# --- episode budget ---
episodes: 2000
max_steps_per_episode: 3000

# --- replay buffer ---
buffer_capacity: 100000
warmup_size: 5000
batch_size: 128

# --- optimizer ---
lr: 1.0e-4
gamma: 0.95
grad_clip_norm: 10.0

# --- exploration ---
epsilon_start: 1.0
epsilon_end: 0.05
epsilon_decay_steps: 200000

# --- target network ---
target_sync_interval: 200

# --- checkpointing ---
checkpoint_dir: agent_system/training/artifacts/dqn/cnn_curriculum_observation_2k_001/checkpoints
checkpoint_interval: 500
agent_id: dqn_cnn_curriculum_observation_2k_001

# --- episode-based curriculum schedule ---
train_opponent_schedule:
  - from_episode: 1
    to_episode: 500
    opponent:
      type: mixed
      opponents:
        - name: random_legal
          type: random_legal
          weight: 0.8
        - name: minimax_d1
          type: minimax
          depth: 1
          weight: 0.2

  - from_episode: 501
    to_episode: 1000
    opponent:
      type: mixed
      opponents:
        - name: random_legal
          type: random_legal
          weight: 0.4
        - name: minimax_d1
          type: minimax
          depth: 1
          weight: 0.6

  - from_episode: 1001
    to_episode: 1500
    opponent:
      type: minimax
      depth: 1

  - from_episode: 1501
    opponent:
      type: mixed
      opponents:
        - name: minimax_d1
          type: minimax
          depth: 1
          weight: 0.8
        - name: minimax_d2
          type: minimax
          depth: 2
          weight: 0.2

# --- evaluation ---
evaluation:
  interval: 500
  games_per_opponent: 200
  replay_sample_every: 100
  opponents:
    - name: pawn_random
      type: pawn_random
    - name: random_legal
      type: random_legal
    - name: minimax_d1
      type: minimax
      depth: 1
    - name: minimax_d2
      type: minimax
      depth: 2

# --- observation / model ---
obs_version: v1
model_arch: cnn
cnn_channels: [32, 64, 64]
algorithm: double_dqn

# --- reward ---
reward_mode: distance_delta
distance_reward_weight: 0.04
distance_delta_clip: 1.0

# --- misc ---
seed: 42
