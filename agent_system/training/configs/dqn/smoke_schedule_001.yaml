# Smoke test for episode-based curriculum (train_opponent_schedule).
# 30 episodes total, 3 phases (10 episodes each).
# Used for validation only — not a meaningful training run.
episodes: 30
max_steps_per_episode: 500
buffer_capacity: 5000
warmup_size: 100
batch_size: 32
lr: 1.0e-3
gamma: 0.95
grad_clip_norm: 10.0
epsilon_start: 1.0
epsilon_end: 0.05
epsilon_decay_steps: 500
target_sync_interval: 50
checkpoint_dir: agent_system/training/artifacts/dqn/smoke_schedule_001/checkpoints
checkpoint_interval: 20
agent_id: dqn_smoke_schedule_001
obs_version: v1
model_arch: mlp
hidden_layers: [64, 64]
algorithm: double_dqn
reward_mode: terminal
seed: 7
log_interval: 10
device: cpu

train_opponent_schedule:
  - from_episode: 1
    to_episode: 10
    opponent:
      type: random_legal

  - from_episode: 11
    to_episode: 20
    opponent:
      type: minimax
      depth: 1

  - from_episode: 21
    opponent:
      type: dummy

evaluation:
  interval: 15
  games_per_opponent: 10
  opponents:
    - name: random_legal
      type: random_legal
    - name: dummy
      type: dummy
