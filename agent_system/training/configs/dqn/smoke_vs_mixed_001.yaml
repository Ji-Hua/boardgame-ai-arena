# Smoke run vs mixed opponent (all 5 types).
# Mixed policy samples one opponent per episode according to relative weights.
# Weights are normalized internally — they do not need to sum to 1.
#
# This config covers the full opponent curriculum:
#   dummy (very weak) + random_legal (weak) + minimax d1/d2/d3 (increasing strength).
#
# Run with:
#   PYTHONPATH=. PYTHONUNBUFFERED=1 uv run python -u scripts/train_dqn.py \
#     --config agent_system/training/configs/dqn/smoke_vs_mixed_001.yaml

# --- episode budget ---
episodes: 300
max_steps_per_episode: 3000

# --- replay buffer ---
buffer_capacity: 50000
warmup_size: 5000
batch_size: 128

# --- optimizer ---
lr: 1.0e-4
gamma: 0.95
grad_clip_norm: 10.0

# --- exploration ---
epsilon_start: 1.0
epsilon_end: 0.05
epsilon_decay_steps: 30000

# --- target network ---
target_sync_interval: 200

# --- checkpointing ---
checkpoint_dir: agent_system/training/artifacts/dqn/smoke_vs_mixed_001/checkpoints
checkpoint_interval: 100
agent_id: smoke_vs_mixed_001

# --- training opponent ---
# Mixed policy: one opponent is selected per episode by the given relative weights.
# Weights are normalized internally and do not need to sum to 1.
train_opponent:
  type: mixed
  opponents:
    - name: dummy
      type: dummy
      weight: 0.1
    - name: random_legal
      type: random_legal
      weight: 0.3
    - name: minimax_d1
      type: minimax
      depth: 1
      weight: 0.2
    - name: minimax_d2
      type: minimax
      depth: 2
      weight: 0.3
    - name: minimax_d3
      type: minimax
      depth: 3
      weight: 0.1

# --- evaluation ---
evaluation:
  interval: 100
  games_per_opponent: 50
  opponents:
    - name: dummy
      type: dummy
    - name: random_legal
      type: random_legal
    - name: minimax_d1
      type: minimax
      depth: 1
    - name: minimax_d2
      type: minimax
      depth: 2

# --- observation / model ---
obs_version: v1
model_arch: mlp
hidden_layers: [256, 256]
algorithm: dqn

# --- reward ---
reward_mode: terminal

# --- misc ---
seed: 42
log_interval: 25
device: auto
