agent_id: dqn_smoke_schedule_001
algorithm: double_dqn
batch_size: 32
buffer_capacity: 5000
checkpoint_dir: agent_system/training/artifacts/dqn/smoke_schedule_001/checkpoints
checkpoint_interval: 20
cnn_channels:
- 32
- 64
- 64
device: cpu
distance_delta_clip: 2.0
distance_reward_weight: 0.01
episodes: 30
epsilon_decay_steps: 500
epsilon_end: 0.05
epsilon_start: 1.0
eval_games: 10
eval_interval: 15
eval_max_steps: 3000
eval_opponent_cfgs:
- name: random_legal
  type: random_legal
- name: dummy
  type: dummy
gamma: 0.95
grad_clip_norm: 10.0
hidden_layers:
- 64
- 64
log_interval: 10
lr: 0.001
max_steps_per_episode: 500
model_arch: mlp
obs_version: v1
opponent: random_legal
opponent_depth: 2
opponent_mix_dummy: 0.0
opponent_mix_minimax_d1: 0.0
opponent_mix_minimax_d2: 0.0
opponent_mix_minimax_d3: 0.0
opponent_mix_random: 0.0
reward_mode: terminal
seed: 7
target_sync_interval: 50
train_opponent_cfg: {}
train_opponent_schedule:
- from_episode: 1
  opponent:
    type: random_legal
  to_episode: 10
- from_episode: 11
  opponent:
    depth: 1
    type: minimax
  to_episode: 20
- from_episode: 21
  opponent:
    type: dummy
warmup_size: 100
